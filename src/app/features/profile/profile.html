<div class="container mx-auto px-4 py-8 max-w-2xl">
  <h1 class="text-3xl font-bold mb-8">My Profile</h1>
  
  <div *ngIf="successMessage" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
    {{ successMessage }}
  </div>
  
  <div *ngIf="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
    {{ errorMessage }}
  </div>
  
  <div class="bg-white rounded-lg shadow p-6 mb-8">
    <h2 class="text-xl font-bold mb-4">Personal Information</h2>
    
    <form [formGroup]="profileForm" (ngSubmit)="updateProfile()">
      <div class="mb-4">
        <label class="block text-sm font-medium mb-2">Full Name *</label>
        <input type="text" formControlName="fullName" class="w-full border rounded-lg px-3 py-2">
        <div *ngIf="profileForm.get('fullName')?.invalid && profileForm.get('fullName')?.touched" class="text-red-500 text-sm mt-1">
          Name must be at least 2 characters
        </div>
      </div>
      
      <div class="mb-4">
        <label class="block text-sm font-medium mb-2">Email *</label>
        <input type="email" formControlName="email" class="w-full border rounded-lg px-3 py-2 bg-gray-50" readonly>
      </div>
      
      <div class="mb-4">
        <label class="block text-sm font-medium mb-2">Phone *</label>
        <input type="tel" formControlName="phone" class="w-full border rounded-lg px-3 py-2">
        <div *ngIf="profileForm.get('phone')?.invalid && profileForm.get('phone')?.touched" class="text-red-500 text-sm mt-1">
          Valid Egyptian phone number required
        </div>
      </div>
      
      <div class="mb-6">
        <label class="block text-sm font-medium mb-2">Address</label>
        <textarea formControlName="address" rows="3" class="w-full border rounded-lg px-3 py-2"></textarea>
      </div>
      
      <button type="submit" [disabled]="isSaving" class="bg-primary-600 text-white px-6 py-2 rounded-lg hover:bg-primary-700 transition disabled:bg-gray-400">
        {{ isSaving ? 'Saving...' : 'Update Profile' }}
      </button>
    </form>
  </div>
  
  <div class="bg-white rounded-lg shadow p-6">
    <h2 class="text-xl font-bold mb-4">Change Password</h2>
    
    <form [formGroup]="passwordForm" (ngSubmit)="changePassword()">
      <div class="mb-4">
        <label class="block text-sm font-medium mb-2">Current Password *</label>
        <input type="password" formControlName="currentPassword" class="w-full border rounded-lg px-3 py-2">
        <div *ngIf="passwordForm.get('currentPassword')?.invalid && passwordForm.get('currentPassword')?.touched" class="text-red-500 text-sm mt-1">
          Password is required
        </div>
      </div>
      
      <div class="mb-4">
        <label class="block text-sm font-medium mb-2">New Password *</label>
        <input type="password" formControlName="newPassword" class="w-full border rounded-lg px-3 py-2">
        <div *ngIf="passwordForm.get('newPassword')?.invalid && passwordForm.get('newPassword')?.touched" class="text-red-500 text-sm mt-1">
          Password must be at least 8 characters with uppercase, lowercase and number
        </div>
      </div>
      
      <div class="mb-6">
        <label class="block text-sm font-medium mb-2">Confirm New Password *</label>
        <input type="password" formControlName="confirmPassword" class="w-full border rounded-lg px-3 py-2">
        <div *ngIf="passwordForm.get('confirmPassword')?.invalid && passwordForm.get('confirmPassword')?.touched" class="text-red-500 text-sm mt-1">
          Confirm your password
        </div>
      </div>
      
      <button type="submit" [disabled]="isChangingPassword" class="bg-primary-600 text-white px-6 py-2 rounded-lg hover:bg-primary-700 transition disabled:bg-gray-400">
        {{ isChangingPassword ? 'Changing...' : 'Change Password' }}
      </button>
    </form>
  </div>
</div>
