<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">Products</h1>
    <button (click)="openCreateModal()" class="bg-primary-600 text-white px-4 py-2 rounded-lg hover:bg-primary-700">
      + Add Product
    </button>
  </div>
  
  <div class="bg-white rounded-lg shadow mb-6 p-4">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div>
        <label class="block text-sm font-medium mb-2">Search</label>
        <input type="text" [(ngModel)]="filters.search" placeholder="Search products..." 
               class="w-full border rounded-lg px-3 py-2">
      </div>
      <div>
        <label class="block text-sm font-medium mb-2">Category</label>
        <select [(ngModel)]="filters.category" class="w-full border rounded-lg px-3 py-2">
          <option value="">All Categories</option>
          <option *ngFor="let cat of categories" [value]="cat._id">{{ cat.name }}</option>
        </select>
      </div>
      <div class="flex items-end gap-2">
        <button (click)="applyFilters()" class="bg-primary-600 text-white px-4 py-2 rounded-lg">Apply</button>
        <button (click)="resetFilters()" class="border px-4 py-2 rounded-lg">Reset</button>
      </div>
    </div>
  </div>
  
  <div *ngIf="isLoading" class="text-center py-12">
    <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-primary-600"></div>
  </div>
  
  <div *ngIf="!isLoading && products.length === 0" class="text-center py-12 bg-white rounded-lg shadow">
    <p class="text-gray-500">No products found.</p>
  </div>
  
  <div *ngIf="products.length > 0" class="bg-white rounded-lg shadow overflow-hidden">
    <table class="w-full">
      <thead class="bg-gray-50 border-b">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Image</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Category</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Price</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Stock</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y">
        <tr *ngFor="let product of products">
          <td class="px-6 py-4">
            <img [src]="getImageUrl(product.image)" [alt]="product.name" class="w-12 h-12 object-cover rounded">
          </td>
          <td class="px-6 py-4 font-medium">{{ product.name }}</td>
          <td class="px-6 py-4">{{ product.category.name }}</td>
          <td class="px-6 py-4">{{ product.price | currency }}</td>
          <td class="px-6 py-4" [class.text-red-600]="product.stockCount === 0">
            {{ product.stockCount }}
          </td>
          <td class="px-6 py-4">
            <button (click)="openEditModal(product)" class="text-blue-600 hover:text-blue-800 mr-3">Edit</button>
            <button (click)="deleteProduct(product._id)" class="text-red-600 hover:text-red-800">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  
  <div *ngIf="totalPages > 1" class="flex justify-center gap-2 mt-6">
    <button (click)="onPageChange(currentPage - 1)" [disabled]="currentPage === 1"
            class="px-3 py-1 border rounded-lg disabled:opacity-50">Previous</button>
    <span class="px-3 py-1">{{ currentPage }} / {{ totalPages }}</span>
    <button (click)="onPageChange(currentPage + 1)" [disabled]="currentPage === totalPages"
            class="px-3 py-1 border rounded-lg disabled:opacity-50">Next</button>
  </div>
</div>

<div *ngIf="showModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto">
    <div class="border-b p-4 flex justify-between">
      <h2 class="text-xl font-bold">{{ editingProduct ? 'Edit Product' : 'Add Product' }}</h2>
      <button (click)="showModal = false" class="text-gray-500 hover:text-gray-700">✕</button>
    </div>
    
    <div class="p-4 space-y-4">
      <div>
        <label class="block text-sm font-medium mb-2">Title *</label>
        <input type="text" [(ngModel)]="formData.title" class="w-full border rounded-lg px-3 py-2">
      </div>
      
      <div>
        <label class="block text-sm font-medium mb-2">Description *</label>
        <textarea [(ngModel)]="formData.description" rows="4" class="w-full border rounded-lg px-3 py-2"></textarea>
      </div>
      
      <div>
        <label class="block text-sm font-medium mb-2">Price *</label>
        <input type="number" [(ngModel)]="formData.price" class="w-full border rounded-lg px-3 py-2">
      </div>
      
      <div>
        <label class="block text-sm font-medium mb-2">Category *</label>
        <select [(ngModel)]="formData.category" class="w-full border rounded-lg px-3 py-2">
          <option value="">Select Category</option>
          <option *ngFor="let cat of categories" [value]="cat._id">{{ cat.name }}</option>
        </select>
      </div>
      
      <div *ngIf="getCategorySubcategories().length">
        <label class="block text-sm font-medium mb-2">Subcategory</label>
        <select [(ngModel)]="formData.subcategory" class="w-full border rounded-lg px-3 py-2">
          <option value="">None</option>
          <option *ngFor="let sub of getCategorySubcategories()" [value]="sub._id">{{ sub.name }}</option>
        </select>
      </div>
      
      <div>
        <label class="block text-sm font-medium mb-2">Stock *</label>
        <input type="number" [(ngModel)]="formData.stock" class="w-full border rounded-lg px-3 py-2">
      </div>
      
      <div>
        <label class="block text-sm font-medium mb-2">Image</label>
        <input type="file" (change)="onImageSelected($event)" accept="image/*" class="w-full">
        <p class="text-xs text-gray-500 mt-1">Leave empty to keep current image</p>
      </div>
    </div>
    
    <div class="border-t p-4 flex justify-end gap-2">
      <button (click)="showModal = false" class="px-4 py-2 border rounded-lg">Cancel</button>
      <button (click)="saveProduct()" class="px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700">
        Save
      </button>
    </div>
  </div>
</div>
