<div class="container mx-auto px-4 py-8 max-w-4xl">
  <h1 class="text-4xl font-bold text-center mb-8">Customer Reviews</h1>
  
  <div *ngIf="successMessage" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-6">
    {{ successMessage }}
  </div>
  
  <div *ngIf="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6">
    {{ errorMessage }}
  </div>
  
  <div class="text-center mb-8">
    <button (click)="showForm = !showForm" class="bg-primary-600 text-white px-6 py-2 rounded-lg hover:bg-primary-700 transition">
      {{ showForm ? 'Cancel' : 'Write a Review' }}
    </button>
  </div>
  
  <div *ngIf="showForm" class="bg-white rounded-lg shadow p-6 mb-8">
    <h2 class="text-xl font-bold mb-4">Share Your Experience</h2>
    
    <form [formGroup]="form" (ngSubmit)="submitReview()">
      <div class="mb-4">
        <label class="block text-sm font-medium mb-2">Rating *</label>
        <div class="flex gap-2">
          <button *ngFor="let star of [1,2,3,4,5]" type="button" (click)="form.patchValue({rating: star})"
                  class="text-2xl" [class.text-yellow-400]="star <= form.value.rating!" [class.text-gray-300]="star > form.value.rating!">
            ★
          </button>
        </div>
      </div>
      
      <div class="mb-6">
        <label class="block text-sm font-medium mb-2">Your Review *</label>
        <textarea formControlName="reviewText" rows="4" class="w-full border rounded-lg px-3 py-2" 
                  placeholder="Tell us about your experience..."></textarea>
        <div *ngIf="form.get('reviewText')?.invalid && form.get('reviewText')?.touched" class="text-red-500 text-sm mt-1">
          Review must be between 10 and 500 characters
        </div>
      </div>
      
      <button type="submit" [disabled]="isSubmitting" class="w-full bg-primary-600 text-white py-2 rounded-lg hover:bg-primary-700 transition disabled:bg-gray-400">
        {{ isSubmitting ? 'Submitting...' : 'Submit Review' }}
      </button>
    </form>
  </div>
  
  <div *ngIf="isLoading" class="text-center py-12">
    <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-primary-600"></div>
  </div>
  
  <div *ngIf="!isLoading && reviews.length === 0" class="text-center py-12 text-gray-500">
    No reviews yet. Be the first to share your experience!
  </div>
  
  <div *ngIf="reviews.length > 0" class="space-y-6">
    <div *ngFor="let review of reviews" class="bg-white rounded-lg shadow p-6">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <div class="w-10 h-10 bg-gray-300 rounded-full flex items-center justify-center">
            {{ review.userName.charAt(0) }}
          </div>
          <div>
            <p class="font-semibold">{{ review.userName }}</p>
            <p class="text-sm text-gray-500">{{ review.createdAt | date }}</p>
          </div>
        </div>
        <div class="flex text-yellow-400">
          <span *ngFor="let star of getStarArray(review.rating)">★</span>
          <span *ngFor="let star of getStarArray(5 - review.rating)" class="text-gray-300">★</span>
        </div>
      </div>
      <p class="text-gray-600 mt-4">{{ review.reviewText }}</p>
    </div>
  </div>
</div>
