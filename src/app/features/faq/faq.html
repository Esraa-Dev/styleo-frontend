<div class="container mx-auto px-4 py-8 max-w-3xl">
  <h1 class="text-4xl font-bold text-center mb-8">Frequently Asked Questions</h1>
  
  <div *ngIf="isLoading" class="text-center py-12">
    <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-primary-600"></div>
  </div>
  
  <div *ngIf="!isLoading && faqs.length === 0" class="text-center py-12 text-gray-500">
    No FAQs available.
  </div>
  
  <div *ngIf="faqs.length > 0" class="space-y-4">
    <div *ngFor="let faq of faqs; let i = index" class="border rounded-lg overflow-hidden">
      <button (click)="toggle(i)" class="w-full px-6 py-4 text-left font-semibold hover:bg-gray-50 flex justify-between items-center">
        {{ faq.question }}
        <svg class="w-5 h-5 transition-transform" [class.rotate-180]="openIndex === i" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
        </svg>
      </button>
      <div *ngIf="openIndex === i" class="px-6 py-4 bg-gray-50 border-t">
        <p class="text-gray-600">{{ faq.answer }}</p>
      </div>
    </div>
  </div>
</div>
