<div class="container mx-auto px-4 py-8">
  <div *ngIf="isLoading" class="text-center py-12">
    <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-primary-600"></div>
  </div>
  
  <div *ngIf="!isLoading" class="grid grid-cols-1 lg:grid-cols-2 gap-12">
    <div>
      <h1 class="text-4xl font-bold mb-6">Contact Us</h1>
      <p class="text-gray-600 mb-8">Have questions? We'd love to hear from you.</p>
      
      <div *ngIf="content" class="space-y-4">
        <div>
          <h3 class="font-semibold mb-2">Phone</h3>
          <p class="text-gray-600">{{ content.phone }}</p>
        </div>
        <div>
          <h3 class="font-semibold mb-2">Email</h3>
          <p class="text-gray-600">{{ content.email }}</p>
        </div>
        <div>
          <h3 class="font-semibold mb-2">Address</h3>
          <p class="text-gray-600">{{ content.address }}</p>
        </div>
        <div>
          <h3 class="font-semibold mb-2">Working Hours</h3>
          <p class="text-gray-600">{{ content.hours }}</p>
        </div>
      </div>
    </div>
    
    <div>
      <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-2xl font-bold mb-6">Send a Message</h2>
        
        <div *ngIf="successMessage" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
          {{ successMessage }}
        </div>
        
        <div *ngIf="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
          {{ errorMessage }}
        </div>
        
        <form [formGroup]="form" (ngSubmit)="submit()">
          <div class="mb-4">
            <label class="block text-sm font-medium mb-2">Name *</label>
            <input type="text" formControlName="name" class="w-full border rounded-lg px-3 py-2">
          </div>
          
          <div class="mb-4">
            <label class="block text-sm font-medium mb-2">Email *</label>
            <input type="email" formControlName="email" class="w-full border rounded-lg px-3 py-2">
          </div>
          
          <div class="mb-4">
            <label class="block text-sm font-medium mb-2">Subject *</label>
            <input type="text" formControlName="subject" class="w-full border rounded-lg px-3 py-2">
          </div>
          
          <div class="mb-6">
            <label class="block text-sm font-medium mb-2">Message *</label>
            <textarea formControlName="message" rows="5" class="w-full border rounded-lg px-3 py-2"></textarea>
          </div>
          
          <button type="submit" [disabled]="isSubmitting" class="w-full bg-primary-600 text-white py-3 rounded-lg hover:bg-primary-700 transition disabled:bg-gray-400">
            {{ isSubmitting ? 'Sending...' : 'Send Message' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
