<div class="container mx-auto px-4 py-8 max-w-4xl">
  <div *ngIf="isLoading" class="text-center py-12">
    <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-primary-600"></div>
  </div>
  
  <div *ngIf="!isLoading && content" class="prose prose-lg max-w-none">
    <h1 class="text-4xl font-bold mb-6">{{ content.title }}</h1>
    <p class="text-gray-600 text-lg mb-8">{{ content.intro }}</p>
    
    <h2 class="text-2xl font-bold mb-4">Why Choose Us</h2>
    <ul class="list-disc pl-6 mb-8">
      <li *ngFor="let highlight of content.highlights" class="mb-2">{{ highlight }}</li>
    </ul>
    
    <h2 class="text-2xl font-bold mb-4">Our Story</h2>
    <p class="text-gray-600">{{ content.story }}</p>
  </div>
</div>
