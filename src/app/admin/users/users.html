<div class="p-6">
  <h1 class="text-3xl font-bold mb-6">Users</h1>
  
  <div class="bg-white rounded-lg shadow mb-6 p-4">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div>
        <label class="block text-sm font-medium mb-2">Search</label>
        <input type="text" [(ngModel)]="filters.search" placeholder="Search by name, email, phone" 
               class="w-full border rounded-lg px-3 py-2">
      </div>
      <div>
        <label class="block text-sm font-medium mb-2">Status</label>
        <select [(ngModel)]="filters.isActive" class="w-full border rounded-lg px-3 py-2">
          <option value="">All</option>
          <option value="true">Active</option>
          <option value="false">Inactive</option>
        </select>
      </div>
      <div class="flex items-end gap-2">
        <button (click)="applyFilters()" class="bg-primary-600 text-white px-4 py-2 rounded-lg">Apply</button>
        <button (click)="resetFilters()" class="border px-4 py-2 rounded-lg">Reset</button>
      </div>
    </div>
  </div>
  
  <div *ngIf="isLoading" class="text-center py-12">
    <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-primary-600"></div>
  </div>
  
  <div *ngIf="!isLoading && users.length === 0" class="text-center py-12 bg-white rounded-lg shadow">
    <p class="text-gray-500">No users found.</p>
  </div>
  
  <div *ngIf="users.length > 0" class="bg-white rounded-lg shadow overflow-hidden">
    <table class="w-full">
      <thead class="bg-gray-50 border-b">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Phone</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Gender</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y">
        <tr *ngFor="let user of users">
          <td class="px-6 py-4 font-medium">{{ user.fullName }}</td>
          <td class="px-6 py-4">{{ user.email }}</td>
          <td class="px-6 py-4">{{ user.phone }}</td>
          <td class="px-6 py-4 capitalize">{{ user.gender }}</td>
          <td class="px-6 py-4">
            <span [class.text-green-600]="user.isActive" [class.text-red-600]="!user.isActive">
              {{ user.isActive ? 'Active' : 'Inactive' }}
            </span>
          </td>
          <td class="px-6 py-4">
            <button (click)="toggleStatus(user)" [disabled]="isToggling"
                    class="px-3 py-1 rounded text-sm"
                    [class.bg-red-500]="user.isActive"
                    [class.bg-green-500]="!user.isActive"
                    [class.text-white]="true">
              {{ user.isActive ? 'Deactivate' : 'Activate' }}
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  
  <div *ngIf="totalPages > 1" class="flex justify-center gap-2 mt-6">
    <button (click)="onPageChange(currentPage - 1)" [disabled]="currentPage === 1"
            class="px-3 py-1 border rounded-lg disabled:opacity-50">Previous</button>
    <span class="px-3 py-1">{{ currentPage }} / {{ totalPages }}</span>
    <button (click)="onPageChange(currentPage + 1)" [disabled]="currentPage === totalPages"
            class="px-3 py-1 border rounded-lg disabled:opacity-50">Next</button>
  </div>
</div>
