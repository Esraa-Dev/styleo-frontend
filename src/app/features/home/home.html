<div class="min-h-screen">
  <section class="bg-gradient-to-r from-primary-600 to-primary-800 text-white py-20">
    <div class="container mx-auto px-4 text-center">
      <h1 class="text-5xl font-bold mb-4">Welcome to Stylo</h1>
      <p class="text-xl mb-8">Discover the latest trends in fashion and lifestyle</p>
      <a routerLink="/products" class="inline-block bg-white text-primary-600 px-8 py-3 rounded-lg font-semibold hover:bg-gray-100 transition">
        Shop Now
      </a>
    </div>
  </section>
  
  <section class="container mx-auto px-4 py-16">
    <h2 class="text-3xl font-bold text-center mb-12">Featured Products</h2>
    
    <div *ngIf="isLoading" class="text-center py-12">
      <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-primary-600"></div>
    </div>
    
    <div *ngIf="!isLoading && featuredProducts.length === 0" class="text-center py-12 text-gray-500">
      No products available.
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
      <app-product-card *ngFor="let product of featuredProducts" [product]="product" />
    </div>
  </section>
  
  <section class="bg-gray-100 py-16">
    <div class="container mx-auto px-4 text-center">
      <h2 class="text-3xl font-bold mb-8">Why Choose Us?</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div>
          <div class="text-4xl mb-4">🚚</div>
          <h3 class="text-xl font-semibold mb-2">Free Shipping</h3>
          <p class="text-gray-600">Free delivery on orders over EGP 500</p>
        </div>
        <div>
          <div class="text-4xl mb-4">🔄</div>
          <h3 class="text-xl font-semibold mb-2">Easy Returns</h3>
          <p class="text-gray-600">30-day return policy</p>
        </div>
        <div>
          <div class="text-4xl mb-4">💳</div>
          <h3 class="text-xl font-semibold mb-2">Secure Payment</h3>
          <p class="text-gray-600">Cash on delivery available</p>
        </div>
      </div>
    </div>
  </section>
</div>
