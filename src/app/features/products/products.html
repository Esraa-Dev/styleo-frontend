<div class="container mx-auto px-4 py-8">
  <div class="flex flex-col lg:flex-row gap-8">
    <aside class="lg:w-1/4">
      <div class="bg-white rounded-lg shadow p-6 sticky top-20">
        <h3 class="text-lg font-semibold mb-4">Filters</h3>
        
        <div class="mb-4">
          <label class="block text-sm font-medium mb-2">Search</label>
          <input type="text" [(ngModel)]="filters.search" placeholder="Search products..." 
                 class="w-full border rounded-lg px-3 py-2">
        </div>
        
        <div class="mb-4">
          <label class="block text-sm font-medium mb-2">Category</label>
          <select [(ngModel)]="filters.category" (change)="filters.subcategory = ''" class="w-full border rounded-lg px-3 py-2">
            <option value="">All Categories</option>
            <option *ngFor="let cat of categories" [value]="cat._id">{{ cat.name }}</option>
          </select>
        </div>
        
        <div class="mb-4" *ngIf="getSelectedCategorySubcategories().length">
          <label class="block text-sm font-medium mb-2">Subcategory</label>
          <select [(ngModel)]="filters.subcategory" class="w-full border rounded-lg px-3 py-2">
            <option value="">All</option>
            <option *ngFor="let sub of getSelectedCategorySubcategories()" [value]="sub._id">{{ sub.name }}</option>
          </select>
        </div>
        
        <div class="mb-6">
          <label class="block text-sm font-medium mb-2">Sort By</label>
          <select [(ngModel)]="filters.sort" class="w-full border rounded-lg px-3 py-2">
            <option *ngFor="let opt of sortOptions" [value]="opt.value">{{ opt.label }}</option>
          </select>
        </div>
        
        <div class="flex gap-2">
          <button (click)="applyFilters()" class="flex-1 bg-primary-600 text-white py-2 rounded-lg hover:bg-primary-700 transition">
            Apply
          </button>
          <button (click)="resetFilters()" class="px-4 border rounded-lg hover:bg-gray-50 transition">
            Reset
          </button>
        </div>
      </div>
    </aside>
    
    <main class="lg:w-3/4">
      <div class="flex justify-between items-center mb-6">
        <p class="text-gray-600">Showing {{ products.length }} of {{ totalItems }} products</p>
      </div>
      
      <div *ngIf="isLoading" class="text-center py-12">
        <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-primary-600"></div>
      </div>
      
      <div *ngIf="!isLoading && products.length === 0" class="text-center py-12">
        <p class="text-gray-500">No products found.</p>
      </div>
      
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <app-product-card *ngFor="let product of products" [product]="product" />
      </div>
      
      <div *ngIf="totalPages > 1" class="flex justify-center gap-2 mt-8">
        <button (click)="onPageChange(currentPage - 1)" [disabled]="currentPage === 1"
                class="px-3 py-1 border rounded-lg disabled:opacity-50 hover:bg-gray-50">
          Previous
        </button>
        <span class="px-3 py-1">{{ currentPage }} / {{ totalPages }}</span>
        <button (click)="onPageChange(currentPage + 1)" [disabled]="currentPage === totalPages"
                class="px-3 py-1 border rounded-lg disabled:opacity-50 hover:bg-gray-50">
          Next
        </button>
      </div>
    </main>
  </div>
</div>
